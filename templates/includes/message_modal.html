<!-- Message Modal -->
<div class="message-modal" id="messageModal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">
                <i class="fas" id="modalIcon"></i>
                <span id="modalTitleText">Notification</span>
            </h3>
            <button class="modal-close-btn" onclick="closeMessageModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <p id="modalMessage"></p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="closeMessageModal()">OK</button>
        </div>
    </div>
</div>

<style>
.message-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
}

.modal-container {
    position: relative;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    width: 90%;
    max-width: 400px;
    box-shadow: var(--shadow-xl);
    animation: modalSlideIn 0.3s ease;
    border: 1px solid var(--border-color);
    z-index: 10000;
}

.modal-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.modal-header h3 {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
}

.modal-header i {
    font-size: 1.25rem;
}

.modal-close-btn {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0.25rem;
    transition: color 0.2s;
}

.modal-close-btn:hover {
    color: var(--danger);
}

.modal-body {
    padding: 1.5rem;
    color: var(--text-secondary);
    line-height: 1.6;
}

.modal-footer {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: flex-end;
}

.modal-footer .btn {
    padding: 0.5rem 2rem;
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

<script>
function showMessageModal(message, type = 'info') {
    const modal = document.getElementById('messageModal');
    const titleEl = document.getElementById('modalTitleText');
    const messageEl = document.getElementById('modalMessage');
    const iconEl = document.getElementById('modalIcon');
    const headerEl = modal.querySelector('.modal-header');
    
    // Set icon and colors based on type
    let icon = 'fa-info-circle';
    let title = 'Notification';
    let color = 'var(--primary)';
    
    switch(type) {
        case 'success':
            icon = 'fa-check-circle';
            title = 'Success';
            color = 'var(--success)';
            break;
        case 'error':
            icon = 'fa-exclamation-circle';
            title = 'Error';
            color = 'var(--danger)';
            break;
        case 'warning':
            icon = 'fa-exclamation-triangle';
            title = 'Warning';
            color = 'var(--warning)';
            break;
        case 'info':
            icon = 'fa-info-circle';
            title = 'Information';
            color = 'var(--primary)';
            break;
    }
    
    iconEl.className = `fas ${icon}`;
    iconEl.style.color = color;
    titleEl.textContent = title;
    messageEl.textContent = message;
    
    modal.style.display = 'flex';
}

function closeMessageModal() {
    const modal = document.getElementById('messageModal');
    modal.style.display = 'none';
}

// Close modal when clicking overlay
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('messageModal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeMessageModal();
            }
        });
    }
});
</script>
